<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <a th:href="@{/todo/new}" class="btn btn-primary">新規登録</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th scope="col" style="width: 80px;">ID</th>
                    <th scope="col">タイトル</th>
                    <th scope="col" style="width: 120px;">完了状態</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">サンプルタスク</td>
                    <td th:text="${todo.completed} ? '完了' : '未完了'">未完了</td>
                </tr>
                <tr th:if="${#lists.isEmpty(todos)}">
                    <td colspan="3" class="text-center text-muted py-4">ToDoがありません</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
