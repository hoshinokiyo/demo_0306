<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <a th:href="@{/todo/new}" class="btn btn-primary">新規登録</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success fade show auto-dismiss" role="alert"
         th:text="${successMessage}">ToDoを削除しました</div>
    <div th:if="${errorMessage}" class="alert alert-danger fade show auto-dismiss" role="alert"
         th:text="${errorMessage}">削除に失敗しました</div>

    <div class="card shadow-sm" th:unless="${#lists.isEmpty(todos)}">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th scope="col" style="width: 80px;">ID</th>
                    <th scope="col">タイトル</th>
                    <th scope="col" style="width: 120px;">完了状態</th>
                    <th scope="col" style="width: 120px;">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">サンプルタスク</td>
                    <td th:text="${todo.completed} ? '完了' : '未完了'">未完了</td>
                    <td>
                        <form th:action="@{|/todo/${todo.id}/delete|}" method="post" class="mb-0"
                              onsubmit="return confirm('本当に削除しますか？');">
                            <button type="submit" class="btn btn-danger btn-sm">削除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card border-0 shadow-sm bg-light" th:if="${#lists.isEmpty(todos)}">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-3">ToDoがまだ登録されていません</h2>
            <p class="text-muted mb-4">まずは「新規作成」からToDoを登録してください。</p>
            <a th:href="@{/todo/new}" class="btn btn-primary px-4">新規作成</a>
        </div>
    </div>
</div>
<script>
    setTimeout(function () {
        document.querySelectorAll('.auto-dismiss').forEach(function (element) {
            element.classList.remove('show');
            setTimeout(function () {
                element.remove();
            }, 300);
        });
    }, 3000);
</script>
</body>
</html>
