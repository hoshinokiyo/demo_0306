<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo登録確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <h1 class="h4 mb-3">登録内容の確認</h1>

            <div class="card shadow-sm mb-4">
                <div class="card-header">確認内容</div>
                <div class="card-body">
                    <p class="mb-0"><strong>タイトル:</strong> サンプルタスク</p>
                </div>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/todo/complete}" class="btn btn-primary">登録</a>
                <a th:href="@{/todo/new}" class="btn btn-outline-secondary">戻る</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
